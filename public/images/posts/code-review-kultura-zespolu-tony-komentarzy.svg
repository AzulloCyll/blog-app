<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="good" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Ta sama uwaga, dwa różne tony</text>

  <rect x="80" y="100" width="340" height="300" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="80" y="100" width="340" height="50" rx="16" fill="url(#bad)"/>
  <rect x="80" y="130" width="340" height="20" fill="url(#bad)"/>
  <text x="250" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">WYROK</text>
  <text x="250" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#334155">„To jest złe.</text>
  <text x="250" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#334155">Popraw.”</text>
  <text x="250" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Zamyka dyskusję,</text>
  <text x="250" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">nie zostawia miejsca na kontekst</text>

  <rect x="480" y="100" width="340" height="300" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="480" y="100" width="340" height="50" rx="16" fill="url(#good)"/>
  <rect x="480" y="130" width="340" height="20" fill="url(#good)"/>
  <text x="650" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">PYTANIE</text>
  <text x="650" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#334155">„Zastanawiam się, czy nie warto</text>
  <text x="650" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#334155">rozważyć X — widziałem podobny</text>
  <text x="650" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#334155">problem w Y. Co myślisz?”</text>
  <text x="650" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Zostawia przestrzeń na</text>
  <text x="650" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">wyjaśnienie kontekstu autora</text>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Ta sama informacja merytoryczna — zupełnie inny ładunek emocjonalny</text>
</svg>
