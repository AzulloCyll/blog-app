<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Remote cache współdzielony przez zespół i CI</text>

  <ellipse cx="450" cy="180" rx="140" ry="70" fill="url(#cloud)" filter="url(#shadow)"/>
  <text x="450" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white">Remote Cache</text>

  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <rect x="90" y="330" width="140" height="70" rx="12" fill="url(#node)" filter="url(#shadow)"/>
    <text x="160" y="370" font-size="12" font-weight="700" fill="white">Dev A</text>

    <rect x="280" y="330" width="140" height="70" rx="12" fill="url(#node)" filter="url(#shadow)"/>
    <text x="350" y="370" font-size="12" font-weight="700" fill="white">Dev B</text>

    <rect x="470" y="330" width="140" height="70" rx="12" fill="url(#node)" filter="url(#shadow)"/>
    <text x="540" y="370" font-size="12" font-weight="700" fill="white">CI</text>

    <rect x="660" y="330" width="140" height="70" rx="12" fill="url(#node)" filter="url(#shadow)"/>
    <text x="730" y="370" font-size="12" font-weight="700" fill="white">Dev C</text>
  </g>

  <line x1="160" y1="330" x2="380" y2="230" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="350" y1="330" x2="420" y2="230" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="540" y1="330" x2="480" y2="230" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="730" y1="330" x2="520" y2="230" stroke="#94a3b8" stroke-width="1.5"/>

  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Ktokolwiek zbuduje dany pakiet, wynik jest natychmiast dostępny dla wszystkich</text>
</svg>
