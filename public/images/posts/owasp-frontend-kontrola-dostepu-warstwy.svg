<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="weak" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="strong" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Kosmetyka UI kontra prawdziwa kontrola dostępu</text>

  <rect x="90" y="110" width="330" height="270" rx="16" fill="url(#weak)" filter="url(#shadow)"/>
  <g font-family="system-ui, sans-serif" text-anchor="middle" fill="white">
    <text x="255" y="150" font-size="14" font-weight="700">Frontend</text>
    <text x="255" y="210" font-size="12" opacity="0.9">Ukryty przycisk</text>
    <text x="255" y="230" font-size="12" opacity="0.9">„Usuń użytkownika”</text>
    <text x="255" y="320" font-size="11" opacity="0.8">to tylko kosmetyka —</text>
    <text x="255" y="337" font-size="11" opacity="0.8">endpoint wciąż dostępny</text>
  </g>

  <rect x="480" y="110" width="330" height="270" rx="16" fill="url(#strong)" filter="url(#shadow)"/>
  <g font-family="system-ui, sans-serif" text-anchor="middle" fill="white">
    <text x="645" y="150" font-size="14" font-weight="700">Backend</text>
    <text x="645" y="210" font-size="12" opacity="0.9">Weryfikacja uprawnień</text>
    <text x="645" y="230" font-size="12" opacity="0.9">przy każdym żądaniu</text>
    <text x="645" y="320" font-size="11" opacity="0.8">jedyne realne miejsce</text>
    <text x="645" y="337" font-size="11" opacity="0.8">kontroli dostępu</text>
  </g>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Każdy, kto zna adres endpointu, może go wywołać z pominięciem interfejsu</text>
</svg>
