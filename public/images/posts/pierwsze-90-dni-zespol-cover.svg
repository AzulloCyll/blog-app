<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Pierwsze 90 dni w nowym zespole</text>

  <circle cx="450" cy="250" r="150" fill="none" stroke="#e2e8f0" stroke-width="24"/>
  <circle cx="450" cy="250" r="150" fill="none" stroke="url(#ring)" stroke-width="24" stroke-dasharray="628" stroke-dashoffset="200" stroke-linecap="round" transform="rotate(-90 450 250)"/>

  <g font-family="system-ui, sans-serif" text-anchor="middle" fill="#1e293b">
    <text x="450" y="220" font-size="34" font-weight="800">90</text>
    <text x="450" y="250" font-size="14" fill="#64748b">dni</text>
  </g>

  <g font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="middle">
    <text x="450" y="70">Dzień 1</text>
    <text x="720" y="250">Dzień 30</text>
    <text x="450" y="440">Dzień 60</text>
    <text x="180" y="250">Dzień 90</text>
  </g>

  <text x="450" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Tempo i oczekiwania ustawione teraz decydują o kolejnych miesiącach współpracy</text>
</svg>
