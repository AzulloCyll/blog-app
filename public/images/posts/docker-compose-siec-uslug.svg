<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Sieć kontenerów tworzona automatycznie</text>

  <rect x="60" y="180" width="770" height="120" rx="20" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="90" y="170" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">sieć compose_default</text>

  <rect x="100" y="210" width="180" height="60" rx="10" fill="url(#c1)" filter="url(#shadow)"/>
  <text x="190" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">app</text>

  <rect x="360" y="210" width="180" height="60" rx="10" fill="url(#c2)" filter="url(#shadow)"/>
  <text x="450" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">postgres:5432</text>

  <line x1="280" y1="240" x2="355" y2="240" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="317" y="230" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">DATABASE_URL=postgres://postgres:5432</text>

  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Nazwa usługi zastępuje adres IP — bez ręcznej konfiguracji sieci</text>
</svg>
