<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="client" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="server" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Cykl życia wywołania Server Action</text>

  <rect x="60" y="80" width="150" height="70" rx="12" fill="url(#client)" filter="url(#shadow)"/>
  <text x="135" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Formularz</text>
  <text x="135" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white" opacity="0.9">action={wyslij}</text>

  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <rect x="60" y="200" width="780" height="230" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="450" y="230" font-size="13" font-weight="700" fill="#334155">'use server'</text>

    <rect x="90" y="255" width="150" height="60" rx="10" fill="url(#server)"/>
    <text x="165" y="282" font-size="11" fill="white" font-weight="700">Autoryzacja</text>
    <text x="165" y="298" font-size="10" fill="white" opacity="0.9">sesja / uprawnienia</text>

    <rect x="270" y="255" width="150" height="60" rx="10" fill="url(#server)"/>
    <text x="345" y="282" font-size="11" fill="white" font-weight="700">Walidacja</text>
    <text x="345" y="298" font-size="10" fill="white" opacity="0.9">schema.parse (Zod)</text>

    <rect x="450" y="255" width="150" height="60" rx="10" fill="url(#server)"/>
    <text x="525" y="282" font-size="11" fill="white" font-weight="700">Zapis</text>
    <text x="525" y="298" font-size="10" fill="white" opacity="0.9">baza danych</text>

    <rect x="630" y="255" width="150" height="60" rx="10" fill="url(#server)"/>
    <text x="705" y="282" font-size="11" fill="white" font-weight="700">revalidatePath</text>
    <text x="705" y="298" font-size="10" fill="white" opacity="0.9">unieważnienie cache</text>

    <line x1="240" y1="285" x2="265" y2="285" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="420" y1="285" x2="445" y2="285" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="600" y1="285" x2="625" y2="285" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

    <text x="450" y="400" font-size="11" fill="#64748b">Wynik wraca do komponentu klienckiego przez useActionState</text>
  </g>

  <line x1="135" y1="150" x2="135" y2="195" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="690" y="80" width="150" height="70" rx="12" fill="url(#client)" filter="url(#shadow)"/>
  <text x="765" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">UI</text>
  <text x="765" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white" opacity="0.9">odświeżony widok</text>
  <line x1="765" y1="195" x2="765" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
