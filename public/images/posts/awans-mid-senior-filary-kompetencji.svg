<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Trzy filary przejścia na poziom senior</text>

  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <rect x="80" y="110" width="230" height="280" rx="16" fill="url(#p1)" filter="url(#shadow)"/>
    <text x="195" y="155" font-size="14" font-weight="700" fill="white">Horyzont</text>
    <text x="195" y="175" font-size="14" font-weight="700" fill="white">decyzji</text>
    <text x="195" y="230" font-size="11" fill="white" opacity="0.9">Ocena wpływu</text>
    <text x="195" y="248" font-size="11" fill="white" opacity="0.9">decyzji na przyszłość</text>
    <text x="195" y="266" font-size="11" fill="white" opacity="0.9">zespołu i systemu</text>

    <rect x="335" y="110" width="230" height="280" rx="16" fill="url(#p2)" filter="url(#shadow)"/>
    <text x="450" y="155" font-size="14" font-weight="700" fill="white">Działanie w</text>
    <text x="450" y="175" font-size="14" font-weight="700" fill="white">niejasności</text>
    <text x="450" y="230" font-size="11" fill="white" opacity="0.9">Podejmowanie decyzji</text>
    <text x="450" y="248" font-size="11" fill="white" opacity="0.9">bez pełnej specyfikacji</text>
    <text x="450" y="266" font-size="11" fill="white" opacity="0.9">i jasna komunikacja</text>

    <rect x="590" y="110" width="230" height="280" rx="16" fill="url(#p3)" filter="url(#shadow)"/>
    <text x="705" y="155" font-size="14" font-weight="700" fill="white">Mentoring</text>
    <text x="705" y="230" font-size="11" fill="white" opacity="0.9">Codzienne nawyki:</text>
    <text x="705" y="248" font-size="11" fill="white" opacity="0.9">komentarze w review,</text>
    <text x="705" y="266" font-size="11" fill="white" opacity="0.9">dzielenie się kontekstem</text>
  </g>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Żaden z filarów nie przychodzi automatycznie z latami stażu — każdy wymaga świadomej praktyki</text>
</svg>
