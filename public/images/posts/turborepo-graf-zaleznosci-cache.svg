<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="changed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cached" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Cache oparty na hashu plików wejściowych</text>

  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <rect x="90" y="150" width="180" height="80" rx="10" fill="url(#changed)" filter="url(#shadow)"/>
    <text x="180" y="185" font-size="12" font-weight="700" fill="white">packages/ui</text>
    <text x="180" y="205" font-size="11" fill="white" opacity="0.9">zmieniony plik</text>

    <rect x="350" y="150" width="180" height="80" rx="10" fill="url(#changed)" filter="url(#shadow)"/>
    <text x="440" y="185" font-size="12" font-weight="700" fill="white">apps/web</text>
    <text x="440" y="205" font-size="11" fill="white" opacity="0.9">build od nowa</text>

    <rect x="610" y="150" width="180" height="80" rx="10" fill="url(#cached)" filter="url(#shadow)"/>
    <text x="700" y="185" font-size="12" font-weight="700" fill="white">apps/api</text>
    <text x="700" y="205" font-size="11" fill="white" opacity="0.9">✓ z cache'u</text>

    <rect x="90" y="290" width="180" height="80" rx="10" fill="url(#cached)" filter="url(#shadow)"/>
    <text x="180" y="325" font-size="12" font-weight="700" fill="white">packages/config</text>
    <text x="180" y="345" font-size="11" fill="white" opacity="0.9">✓ z cache'u</text>
  </g>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Tylko pakiety zależne od zmiany budują się od nowa — reszta wraca z cache'u</text>
</svg>
