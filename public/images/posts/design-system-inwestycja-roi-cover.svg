<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00000040"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Background grid -->
  <line x1="0" y1="100" x2="900" y2="100" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="300" x2="900" y2="300" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="400" x2="900" y2="400" stroke="#ffffff08" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="500" stroke="#ffffff08" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="500" stroke="#ffffff08" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="500" stroke="#ffffff08" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="#ffffff08" stroke-width="1"/>
  <line x1="750" y1="0" x2="750" y2="500" stroke="#ffffff08" stroke-width="1"/>

  <!-- Glow blobs -->
  <circle cx="200" cy="250" r="150" fill="#6366f120" filter="url(#glow)"/>
  <circle cx="700" cy="200" r="120" fill="#10b98115" filter="url(#glow)"/>

  <!-- Left: Component cards stacked -->
  <g transform="translate(60, 120)">
    <!-- Card shadow base -->
    <rect x="10" y="50" width="280" height="80" rx="12" fill="#6366f130"/>
    <rect x="5" y="25" width="280" height="80" rx="12" fill="#6366f150"/>
    <!-- Main card -->
    <rect x="0" y="0" width="280" height="80" rx="12" fill="url(#card1)" filter="url(#shadow)"/>
    <text x="20" y="28" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff80" letter-spacing="1">KOMPONENT</text>
    <text x="20" y="52" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">Button / Primary</text>
    <rect x="200" y="20" width="60" height="40" rx="8" fill="#ffffff20"/>
    <text x="230" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">Btn</text>

    <!-- Card 2 -->
    <rect x="0" y="100" width="280" height="80" rx="12" fill="url(#card2)" filter="url(#shadow)"/>
    <text x="20" y="128" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff80" letter-spacing="1">TOKEN</text>
    <text x="20" y="152" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">Color / Primary</text>
    <rect x="200" y="116" width="40" height="40" rx="8" fill="#ffffff30"/>
    <rect x="208" y="124" width="24" height="24" rx="4" fill="#6366f1"/>

    <!-- Card 3 -->
    <rect x="0" y="200" width="280" height="80" rx="12" fill="url(#card3)" filter="url(#shadow)"/>
    <text x="20" y="228" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff80" letter-spacing="1">TYPOGRAFIA</text>
    <text x="20" y="252" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">Heading / XL</text>
    <text x="220" y="252" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#ffffff40">Aa</text>
  </g>

  <!-- Arrow -->
  <line x1="370" y1="250" x2="430" y2="250" stroke="#ffffff30" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="430,244 442,250 430,256" fill="#ffffff30"/>

  <!-- Right: ROI / value display -->
  <g transform="translate(455, 90)">
    <rect x="0" y="0" width="380" height="320" rx="16" fill="#ffffff08" stroke="#ffffff15" stroke-width="1"/>

    <text x="20" y="40" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="1">ZWROT Z INWESTYCJI</text>

    <!-- Metric 1 -->
    <rect x="20" y="60" width="160" height="70" rx="10" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
    <text x="40" y="90" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#818cf8">−60%</text>
    <text x="40" y="114" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1">czasu implementacji</text>

    <!-- Metric 2 -->
    <rect x="200" y="60" width="160" height="70" rx="10" fill="#10b98120" stroke="#10b98140" stroke-width="1"/>
    <text x="220" y="90" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#34d399">3×</text>
    <text x="220" y="114" font-family="system-ui, sans-serif" font-size="11" fill="#10b981">szybszy onboarding</text>

    <!-- Metric 3 -->
    <rect x="20" y="150" width="160" height="70" rx="10" fill="#f59e0b20" stroke="#f59e0b40" stroke-width="1"/>
    <text x="40" y="180" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#fbbf24">−80%</text>
    <text x="40" y="204" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b">błędów spójności</text>

    <!-- Metric 4 -->
    <rect x="200" y="150" width="160" height="70" rx="10" fill="#ec489920" stroke="#ec489940" stroke-width="1"/>
    <text x="220" y="180" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#f472b6">+40%</text>
    <text x="220" y="204" font-family="system-ui, sans-serif" font-size="11" fill="#ec4899">satysfakcji zespołu</text>

    <!-- Bar chart -->
    <text x="20" y="255" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">BEZ DESIGN SYSTEM</text>
    <rect x="20" y="262" width="340" height="12" rx="6" fill="#ffffff10"/>
    <rect x="20" y="262" width="300" height="12" rx="6" fill="#ef444450"/>
    <text x="328" y="272" font-family="system-ui, sans-serif" font-size="10" fill="#f87171">88%</text>

    <text x="20" y="293" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Z DESIGN SYSTEM</text>
    <rect x="20" y="300" width="340" height="12" rx="6" fill="#ffffff10"/>
    <rect x="20" y="300" width="120" height="12" rx="6" fill="#10b98180"/>
    <text x="148" y="310" font-family="system-ui, sans-serif" font-size="10" fill="#34d399">35%</text>
  </g>

  <!-- Title overlay at bottom -->
  <rect x="0" y="420" width="900" height="80" fill="#00000060"/>
  <text x="60" y="462" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="white">Design system jako inwestycja, nie koszt</text>
  <text x="60" y="486" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Jak policzyć ROI i przekonać biznes do systemu projektowego</text>
</svg>
