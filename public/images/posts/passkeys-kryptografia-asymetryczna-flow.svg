<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="device" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Logowanie przez podpisane wyzwanie</text>

  <rect x="90" y="160" width="240" height="140" rx="16" fill="url(#device)" filter="url(#shadow)"/>
  <text x="210" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Urządzenie</text>
  <text x="210" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.9">klucz prywatny</text>
  <text x="210" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.9">+ biometria</text>

  <rect x="570" y="160" width="240" height="140" rx="16" fill="url(#serv)" filter="url(#shadow)"/>
  <text x="690" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Serwer</text>
  <text x="690" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.9">klucz publiczny</text>
  <text x="690" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.9">weryfikuje podpis</text>

  <line x1="570" y1="200" x2="335" y2="200" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">1. losowe wyzwanie</text>

  <line x1="330" y1="250" x2="565" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">2. podpisane wyzwanie</text>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Klucz prywatny nigdy nie opuszcza urządzenia — serwer weryfikuje tylko podpis</text>
</svg>
