<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="danger" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">OWASP Top 10 dla frontend developerów</text>

  <rect x="150" y="100" width="600" height="300" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>

  <g font-family="system-ui, sans-serif" font-size="13" fill="#334155">
    <rect x="185" y="130" width="34" height="34" rx="8" fill="url(#danger)"/>
    <text x="202" y="153" text-anchor="middle" fill="white" font-weight="700" font-size="14">A03</text>
    <text x="235" y="153" font-weight="700">Injection (w tym XSS)</text>

    <rect x="185" y="185" width="34" height="34" rx="8" fill="url(#danger)"/>
    <text x="202" y="208" text-anchor="middle" fill="white" font-weight="700" font-size="14">A01</text>
    <text x="235" y="208" font-weight="700">Broken Access Control</text>

    <rect x="185" y="240" width="34" height="34" rx="8" fill="url(#danger)"/>
    <text x="202" y="263" text-anchor="middle" fill="white" font-weight="700" font-size="14">A04</text>
    <text x="235" y="263" font-weight="700">Insecure Design</text>

    <rect x="185" y="295" width="34" height="34" rx="8" fill="url(#danger)"/>
    <text x="202" y="318" text-anchor="middle" fill="white" font-weight="700" font-size="14">A06</text>
    <text x="235" y="318" font-weight="700">Vulnerable Components</text>
  </g>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Znaczna część listy dotyczy bezpośrednio kodu pisanego po stronie klienta</text>
</svg>
