<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Ten sam komponent — jasny i ciemny motyw z prefiksem dark:</text>

  <!-- Light card -->
  <g font-family="system-ui, sans-serif">
    <rect x="90" y="90" width="320" height="320" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="250" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8">JASNY MOTYW</text>
    <rect x="120" y="160" width="260" height="120" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="150" cy="190" r="16" fill="#4f46e5"/>
    <rect x="176" y="182" width="120" height="10" rx="5" fill="#1e293b"/>
    <rect x="176" y="200" width="80" height="8" rx="4" fill="#94a3b8"/>
    <rect x="120" y="250" width="100" height="24" rx="8" fill="#4f46e5"/>
    <text x="150" y="266" text-anchor="middle" font-size="10" fill="white" font-weight="700">Wyślij</text>
    <text x="250" y="330" text-anchor="middle" font-family="monospace" font-size="11" fill="#4f46e5">bg-white text-gray-900</text>
    <text x="250" y="355" text-anchor="middle" font-family="monospace" font-size="11" fill="#4f46e5">bg-indigo-600</text>
  </g>

  <!-- Dark card -->
  <g font-family="system-ui, sans-serif">
    <rect x="490" y="90" width="320" height="320" rx="20" fill="#111827" stroke="#1f2937" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="650" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b">CIEMNY MOTYW</text>
    <rect x="520" y="160" width="260" height="120" rx="14" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <circle cx="550" cy="190" r="16" fill="#818cf8"/>
    <rect x="576" y="182" width="120" height="10" rx="5" fill="#f1f5f9"/>
    <rect x="576" y="200" width="80" height="8" rx="4" fill="#64748b"/>
    <rect x="520" y="250" width="100" height="24" rx="8" fill="#818cf8"/>
    <text x="550" y="266" text-anchor="middle" font-size="10" fill="#111827" font-weight="700">Wyślij</text>
    <text x="650" y="330" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8">dark:bg-gray-900 dark:text-white</text>
    <text x="650" y="355" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8">dark:bg-indigo-400</text>
  </g>

  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Obie wersje generowane są w czasie budowania — przełącznik jedynie dodaje klasę "dark" do &lt;html&gt;</text>
</svg>
