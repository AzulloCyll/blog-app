<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ok" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deploy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Deployment tylko po zielonym CI</text>

  <rect x="80" y="130" width="220" height="90" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="190" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#334155">git push main</text>

  <rect x="340" y="130" width="220" height="90" rx="12" fill="url(#ok)" filter="url(#shadow)"/>
  <text x="450" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">CI: testy + build</text>
  <text x="450" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="white">✓</text>

  <rect x="600" y="130" width="220" height="90" rx="12" fill="url(#deploy)" filter="url(#shadow)"/>
  <text x="710" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Deployment</text>

  <line x1="300" y1="175" x2="335" y2="175" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="175" x2="595" y2="175" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="340" y="280" width="220" height="70" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="1.5"/>
  <text x="450" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#b91c1c">CI: testy nie przeszły</text>
  <text x="450" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">✗ deployment zablokowany</text>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Błąd w testach automatycznie blokuje wdrożenie, bez polegania na ludzkiej dyscyplinie</text>
</svg>
