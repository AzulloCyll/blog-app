<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="machine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="human" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Co recenzuje maszyna, a co człowiek</text>

  <rect x="90" y="100" width="330" height="320" rx="16" fill="url(#machine)" filter="url(#shadow)"/>
  <g font-family="system-ui, sans-serif" text-anchor="middle" fill="white">
    <text x="255" y="140" font-size="15" font-weight="700">Linter / Formatter</text>
    <text x="255" y="195" font-size="12" opacity="0.9">Formatowanie kodu</text>
    <text x="255" y="225" font-size="12" opacity="0.9">Kolejność importów</text>
    <text x="255" y="255" font-size="12" opacity="0.9">Konwencje nazewnictwa</text>
    <text x="255" y="285" font-size="12" opacity="0.9">Białe znaki, średniki</text>
    <text x="255" y="380" font-size="11" opacity="0.8">automatyczne, natychmiastowe,</text>
    <text x="255" y="397" font-size="11" opacity="0.8">bez udziału człowieka</text>
  </g>

  <rect x="480" y="100" width="330" height="320" rx="16" fill="url(#human)" filter="url(#shadow)"/>
  <g font-family="system-ui, sans-serif" text-anchor="middle" fill="white">
    <text x="645" y="140" font-size="15" font-weight="700">Reviewer</text>
    <text x="645" y="195" font-size="12" opacity="0.9">Sens abstrakcji</text>
    <text x="645" y="225" font-size="12" opacity="0.9">Obsłużone przypadki brzegowe</text>
    <text x="645" y="255" font-size="12" opacity="0.9">Nazwa opisująca zachowanie</text>
    <text x="645" y="285" font-size="12" opacity="0.9">Wpływ na architekturę</text>
    <text x="645" y="380" font-size="11" opacity="0.8">wymaga kontekstu i osądu,</text>
    <text x="645" y="397" font-size="11" opacity="0.8">którego maszyna nie ma</text>
  </g>

  <text x="450" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Im więcej przejmie automatyzacja, tym więcej uwagi zostaje na to, co naprawdę ważne</text>
</svg>
