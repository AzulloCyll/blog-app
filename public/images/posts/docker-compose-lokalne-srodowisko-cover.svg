<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">docker-compose.yml — jedno środowisko dla wszystkich</text>

  <rect x="250" y="100" width="400" height="60" rx="12" fill="#1e293b" filter="url(#shadow)"/>
  <text x="450" y="137" text-anchor="middle" font-family="monospace" font-size="14" fill="#e2e8f0">docker compose up</text>

  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <rect x="140" y="220" width="180" height="140" rx="14" fill="url(#c1)" filter="url(#shadow)"/>
    <text x="230" y="260" font-size="13" font-weight="700" fill="white">app</text>
    <text x="230" y="285" font-size="10" fill="white" opacity="0.9">Next.js</text>

    <rect x="360" y="220" width="180" height="140" rx="14" fill="url(#c2)" filter="url(#shadow)"/>
    <text x="450" y="260" font-size="13" font-weight="700" fill="white">postgres</text>
    <text x="450" y="285" font-size="10" fill="white" opacity="0.9">baza danych</text>

    <rect x="580" y="220" width="180" height="140" rx="14" fill="url(#c3)" filter="url(#shadow)"/>
    <text x="670" y="260" font-size="13" font-weight="700" fill="white">redis</text>
    <text x="670" y="285" font-size="10" fill="white" opacity="0.9">cache</text>
  </g>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Identyczne środowisko na macOS, Linuxie i Windowsie — jedna komenda</text>
</svg>
