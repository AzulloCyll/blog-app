<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Bezpieczne sekrety w Next.js</text>

  <rect x="370" y="120" width="160" height="140" rx="16" fill="url(#lock)" filter="url(#shadow)"/>
  <rect x="405" y="90" width="90" height="70" rx="45" fill="none" stroke="url(#lock)" stroke-width="14"/>
  <text x="450" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" fill="white">🔒</text>

  <g font-family="monospace" font-size="13" fill="#334155">
    <text x="150" y="330">SECRET_KEY=...</text>
    <text x="150" y="360" fill="#059669">✓ tylko serwer</text>
  </g>

  <g font-family="monospace" font-size="13" fill="#334155" text-anchor="end">
    <text x="750" y="330">NEXT_PUBLIC_KEY=...</text>
    <text x="750" y="360" fill="#dc2626">✗ widoczne w przeglądarce</text>
  </g>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Jeden nieopatrzny prefiks potrafi ujawnić klucz każdemu odwiedzającemu</text>
</svg>
