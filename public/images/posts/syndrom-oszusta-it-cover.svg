<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="person" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Syndrom oszusta w branży IT</text>

  <circle cx="450" cy="230" r="90" fill="url(#person)" filter="url(#shadow)"/>
  <text x="450" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="52" fill="white">🤔</text>

  <g font-family="system-ui, sans-serif" font-size="12" fill="#475569" font-style="italic">
    <text x="150" y="120">„To był tylko szczęśliwy traf...”</text>
    <text x="620" y="150">„Ktoś w końcu się zorientuje”</text>
    <text x="140" y="360">„Wszyscy wiedzą więcej niż ja”</text>
    <text x="600" y="380">„Nie zasłużyłem na ten awans”</text>
  </g>

  <line x1="245" y1="140" x2="380" y2="200" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="655" y1="165" x2="520" y2="200" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="245" y1="350" x2="380" y2="270" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="655" y1="370" x2="520" y2="270" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 3"/>

  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Dotyka programistów niezależnie od realnego poziomu doświadczenia</text>
</svg>
