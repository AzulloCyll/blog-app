<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Trzy generacje narzędzi AI dla programistów</text>

  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <rect x="60" y="150" width="220" height="180" rx="16" fill="url(#g1)" filter="url(#shadow)"/>
    <text x="170" y="195" font-size="14" font-weight="700" fill="white">Autouzupełnianie</text>
    <text x="170" y="225" font-size="11" fill="white" opacity="0.9">Sugestia jednej linijki</text>
    <text x="170" y="245" font-size="11" fill="white" opacity="0.9">lub bloku kodu</text>
    <text x="170" y="290" font-size="10" fill="white" opacity="0.8">Człowiek inicjuje</text>
    <text x="170" y="305" font-size="10" fill="white" opacity="0.8">i weryfikuje każdą linię</text>

    <rect x="340" y="120" width="220" height="240" rx="16" fill="url(#g2)" filter="url(#shadow)"/>
    <text x="450" y="165" font-size="14" font-weight="700" fill="white">Asystent</text>
    <text x="450" y="185" font-size="14" font-weight="700" fill="white">konwersacyjny</text>
    <text x="450" y="225" font-size="11" fill="white" opacity="0.9">Wyjaśnia, refaktoryzuje,</text>
    <text x="450" y="245" font-size="11" fill="white" opacity="0.9">pisze funkcje z opisu</text>
    <text x="450" y="300" font-size="10" fill="white" opacity="0.8">Człowiek inicjuje</text>
    <text x="450" y="315" font-size="10" fill="white" opacity="0.8">każdą interakcję</text>

    <rect x="620" y="90" width="220" height="270" rx="16" fill="url(#g3)" filter="url(#shadow)"/>
    <text x="730" y="135" font-size="14" font-weight="700" fill="white">Autonomiczny</text>
    <text x="730" y="155" font-size="14" font-weight="700" fill="white">agent</text>
    <text x="730" y="195" font-size="11" fill="white" opacity="0.9">Dostaje zadanie z ticketu,</text>
    <text x="730" y="215" font-size="11" fill="white" opacity="0.9">planuje zmiany, testuje,</text>
    <text x="730" y="235" font-size="11" fill="white" opacity="0.9">zgłasza pull request</text>
    <text x="730" y="290" font-size="10" fill="white" opacity="0.8">Człowiek weryfikuje</text>
    <text x="730" y="305" font-size="10" fill="white" opacity="0.8">gotowy wynik</text>

    <line x1="285" y1="240" x2="335" y2="240" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="565" y1="240" x2="615" y2="225" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <text x="450" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Każda kolejna generacja przejmuje więcej odpowiedzialności — i wymaga innego modelu nadzoru</text>
</svg>
