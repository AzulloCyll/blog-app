<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="costLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="savingsLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="fillSavings" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b98130"/>
      <stop offset="100%" style="stop-color:#10b98105"/>
    </linearGradient>
    <linearGradient id="fillCost" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef444420"/>
      <stop offset="100%" style="stop-color:#ef444405"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000015"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#0f172a">Punkt zwrotu z inwestycji w design system</text>
  <text x="450" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Koszt braku systemu vs. koszt utrzymania systemu w czasie</text>

  <!-- Chart area -->
  <!-- Axes -->
  <line x1="90" y1="90" x2="90" y2="400" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="90" y1="400" x2="820" y2="400" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Y axis label -->
  <text x="30" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" transform="rotate(-90 30 250)">Skumulowany koszt / zysk</text>

  <!-- X axis labels: months -->
  <text x="90"  y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">0</text>
  <text x="198" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">3 mies.</text>
  <text x="306" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">6 mies.</text>
  <text x="414" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">9 mies.</text>
  <text x="522" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">12 mies.</text>
  <text x="630" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">18 mies.</text>
  <text x="738" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">24 mies.</text>

  <!-- Y axis grid lines and labels -->
  <line x1="90" y1="340" x2="820" y2="340" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="90" y1="280" x2="820" y2="280" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="90" y1="220" x2="820" y2="220" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="90" y1="160" x2="820" y2="160" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="90" y1="100" x2="820" y2="100" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- RED area: cost of no design system (grows over time) -->
  <!-- Bezier curve going up steeply -->
  <path d="M90,400 C200,390 300,350 414,290 C522,230 630,165 820,100 L820,400 Z"
        fill="url(#fillCost)"/>
  <path d="M90,400 C200,390 300,350 414,290 C522,230 630,165 820,100"
        fill="none" stroke="url(#costLine)" stroke-width="3" stroke-linecap="round"/>

  <!-- GREEN area: cost WITH design system (initial investment, then savings) -->
  <!-- Starts high (investment), goes below red line after breakeven -->
  <path d="M90,400 C130,290 160,240 198,260 C270,280 340,300 414,290 C500,278 600,220 820,140 L820,400 Z"
        fill="url(#fillSavings)" opacity="0.6"/>
  <path d="M90,400 C130,290 160,240 198,260 C270,280 340,300 414,290 C500,278 600,220 820,140"
        fill="none" stroke="url(#savingsLine)" stroke-width="3" stroke-linecap="round"/>

  <!-- Breakeven point marker -->
  <circle cx="414" cy="290" r="10" fill="white" stroke="#6366f1" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="414" cy="290" r="4" fill="#6366f1"/>

  <!-- Breakeven vertical dashed line -->
  <line x1="414" y1="290" x2="414" y2="400" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Breakeven label -->
  <rect x="300" y="240" width="140" height="38" rx="8" fill="#6366f1" filter="url(#shadow)"/>
  <text x="370" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white">PUNKT ZWROTU</text>
  <text x="370" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c7d2fe">~9–12 miesięcy</text>
  <!-- Arrow from label to point -->
  <line x1="410" y1="278" x2="414" y2="288" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Investment phase annotation -->
  <rect x="100" y="96" width="140" height="30" rx="6" fill="#fef3c7"/>
  <text x="170" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Faza inwestycji</text>
  <line x1="175" y1="126" x2="198" y2="258" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Long-term savings annotation -->
  <rect x="640" y="96" width="160" height="30" rx="6" fill="#dcfce7"/>
  <text x="720" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#166534">Skumulowane oszczędności</text>
  <!-- Shaded area between curves on the right -->
  <path d="M522,250 C580,228 660,192 820,140 L820,170 C660,222 580,258 522,280 Z" fill="#10b98125"/>

  <!-- Legend -->
  <rect x="550" y="440" width="14" height="4" rx="2" fill="#ef4444"/>
  <text x="570" y="449" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Koszt braku design systemu</text>
  <rect x="715" y="440" width="14" height="4" rx="2" fill="#10b981"/>
  <text x="735" y="449" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Z design systemem</text>

  <!-- Phase labels on X axis -->
  <rect x="93" y="435" width="100" height="18" rx="4" fill="#fef3c7"/>
  <text x="143" y="448" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">BUDOWA</text>
  <rect x="200" y="435" width="108" height="18" rx="4" fill="#ede9fe"/>
  <text x="254" y="448" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6d28d9">ADOPCJA</text>
  <rect x="315" y="435" width="190" height="18" rx="4" fill="#dcfce7"/>
  <text x="410" y="448" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#166534">ZWROT I SKALOWANIE</text>
</svg>
