<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Code review jako budowanie zespołu</text>

  <!-- Pull request card -->
  <rect x="120" y="110" width="300" height="280" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="120" y="110" width="300" height="46" rx="16" fill="url(#cardA)"/>
  <rect x="120" y="136" width="300" height="20" fill="url(#cardA)"/>
  <text x="270" y="139" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Pull Request #482</text>

  <g font-family="system-ui, sans-serif" font-size="11" fill="#475569">
    <circle cx="150" cy="195" r="10" fill="#a5b4fc"/>
    <rect x="170" y="188" width="200" height="8" rx="4" fill="#e2e8f0"/>
    <text x="150" y="235">💬 „Ciekawe podejście — czy</text>
    <text x="150" y="250">rozważaliśmy X jako alternatywę?”</text>

    <circle cx="150" cy="290" r="10" fill="#6ee7b7"/>
    <rect x="170" y="283" width="200" height="8" rx="4" fill="#e2e8f0"/>
    <text x="150" y="330">✅ Approved</text>
  </g>

  <!-- Two people icons -->
  <circle cx="620" cy="220" r="46" fill="url(#cardA)" filter="url(#shadow)"/>
  <text x="620" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="white">👤</text>
  <circle cx="740" cy="220" r="46" fill="url(#cardB)" filter="url(#shadow)"/>
  <text x="740" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="white">👤</text>
  <path d="M 668 220 L 692 220" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6 5"/>

  <text x="680" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Zaufanie zbudowane</text>
  <text x="680" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">wspólną pracą nad kodem</text>
</svg>
