<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="client" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="api" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="origin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Warstwy architektury — od klienta do bazy danych</text>

  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <rect x="40" y="200" width="160" height="100" rx="14" fill="url(#client)" filter="url(#shadow)"/>
    <text x="120" y="245" font-size="15" font-weight="700" fill="white">Klient</text>
    <text x="120" y="265" font-size="11" fill="white" opacity="0.9">przeglądarka</text>

    <rect x="255" y="200" width="160" height="100" rx="14" fill="url(#edge)" filter="url(#shadow)"/>
    <text x="335" y="238" font-size="15" font-weight="700" fill="white">Edge / CDN</text>
    <text x="335" y="258" font-size="11" fill="white" opacity="0.9">cache, geo,</text>
    <text x="335" y="273" font-size="11" fill="white" opacity="0.9">personalizacja</text>

    <rect x="470" y="140" width="180" height="220" rx="14" fill="url(#api)" filter="url(#shadow)"/>
    <text x="560" y="175" font-size="15" font-weight="700" fill="white">Warstwa API</text>
    <text x="560" y="215" font-size="12" fill="white" opacity="0.9">REST</text>
    <text x="560" y="245" font-size="12" fill="white" opacity="0.9">GraphQL</text>
    <text x="560" y="275" font-size="12" fill="white" opacity="0.9">tRPC</text>

    <rect x="700" y="200" width="160" height="100" rx="14" fill="url(#origin)" filter="url(#shadow)"/>
    <text x="780" y="238" font-size="15" font-weight="700" fill="white">Origin</text>
    <text x="780" y="258" font-size="11" fill="white" opacity="0.9">serwer + baza</text>
    <text x="780" y="273" font-size="11" fill="white" opacity="0.9">danych</text>

    <line x1="200" y1="250" x2="250" y2="250" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="415" y1="250" x2="465" y2="250" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="650" y1="250" x2="695" y2="250" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <text x="450" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Im więcej logiki obsłuży brzeg sieci, tym mniej żądań dotrze do origin servera</text>
</svg>
