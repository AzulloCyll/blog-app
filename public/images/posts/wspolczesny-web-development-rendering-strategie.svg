<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="csr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ssr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ssg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="isr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stream" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Strategie renderowania — od CSR do streaming SSR</text>

  <!-- 5 columns -->
  <g font-family="system-ui, sans-serif">
    <rect x="40" y="90" width="150" height="300" rx="14" fill="url(#csr)" filter="url(#shadow)"/>
    <text x="115" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="white">CSR</text>
    <text x="115" y="155" text-anchor="middle" font-size="11" fill="white" opacity="0.9">Client-Side</text>
    <text x="115" y="230" text-anchor="middle" font-size="11" fill="white" opacity="0.85">Puste HTML +</text>
    <text x="115" y="248" text-anchor="middle" font-size="11" fill="white" opacity="0.85">cały JS</text>

    <rect x="205" y="90" width="150" height="300" rx="14" fill="url(#ssr)" filter="url(#shadow)"/>
    <text x="280" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="white">SSR</text>
    <text x="280" y="155" text-anchor="middle" font-size="11" fill="white" opacity="0.9">Server-Side</text>
    <text x="280" y="230" text-anchor="middle" font-size="11" fill="white" opacity="0.85">HTML przy</text>
    <text x="280" y="248" text-anchor="middle" font-size="11" fill="white" opacity="0.85">każdym żądaniu</text>

    <rect x="370" y="90" width="150" height="300" rx="14" fill="url(#ssg)" filter="url(#shadow)"/>
    <text x="445" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="white">SSG</text>
    <text x="445" y="155" text-anchor="middle" font-size="11" fill="white" opacity="0.9">Static</text>
    <text x="445" y="230" text-anchor="middle" font-size="11" fill="white" opacity="0.85">Wygenerowane</text>
    <text x="445" y="248" text-anchor="middle" font-size="11" fill="white" opacity="0.85">raz, w buildzie</text>

    <rect x="535" y="90" width="150" height="300" rx="14" fill="url(#isr)" filter="url(#shadow)"/>
    <text x="610" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="white">ISR</text>
    <text x="610" y="155" text-anchor="middle" font-size="11" fill="white" opacity="0.9">Incremental</text>
    <text x="610" y="230" text-anchor="middle" font-size="11" fill="white" opacity="0.85">Statyczne, ale</text>
    <text x="610" y="248" text-anchor="middle" font-size="11" fill="white" opacity="0.85">odświeżane w tle</text>

    <rect x="700" y="90" width="160" height="300" rx="14" fill="url(#stream)" filter="url(#shadow)"/>
    <text x="780" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="white">Streaming</text>
    <text x="780" y="155" text-anchor="middle" font-size="11" fill="white" opacity="0.9">SSR</text>
    <text x="780" y="230" text-anchor="middle" font-size="11" fill="white" opacity="0.85">HTML</text>
    <text x="780" y="248" text-anchor="middle" font-size="11" fill="white" opacity="0.85">fragmentami</text>
  </g>

  <!-- axis -->
  <line x1="40" y1="430" x2="860" y2="430" stroke="#cbd5e1" stroke-width="2"/>
  <text x="40" y="455" font-size="12" fill="#64748b" font-family="system-ui, sans-serif">← Zawsze aktualne</text>
  <text x="740" y="455" font-size="12" fill="#64748b" font-family="system-ui, sans-serif" text-anchor="end">Zawsze szybkie →</text>
</svg>
