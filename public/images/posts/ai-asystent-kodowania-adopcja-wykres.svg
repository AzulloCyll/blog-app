<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Skąd realnie pochodzi zwrot z inwestycji w AI dla zespołów dev</text>
  <text x="450" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Ilustracyjny podział — pięć źródeł, razem 100% postrzeganej wartości</text>

  <!-- Stacked bar: 700px = 100%, segments in order -->
  <!-- Reakcja na incydenty 30% = 210px -->
  <rect x="100" y="150" width="210" height="90" fill="#059669" filter="url(#shadow)"/>
  <!-- Onboarding 25% = 175px -->
  <rect x="310" y="150" width="175" height="90" fill="#10b981"/>
  <!-- Czas na architekturę 20% = 140px -->
  <rect x="485" y="150" width="140" height="90" fill="#4f46e5"/>
  <!-- Szybsze pisanie kodu 15% = 105px -->
  <rect x="625" y="150" width="105" height="90" fill="#6366f1"/>
  <!-- Mniej regresji produkcyjnych 10% = 70px -->
  <rect x="730" y="150" width="70" height="90" fill="#a5b4fc"/>

  <g font-family="system-ui, sans-serif" font-weight="700" font-size="15" fill="white" text-anchor="middle">
    <text x="205" y="202">30%</text>
    <text x="397" y="202">25%</text>
    <text x="555" y="202">20%</text>
    <text x="677" y="202">15%</text>
    <text x="765" y="202" fill="#312e81">10%</text>
  </g>

  <!-- Legend -->
  <g font-family="system-ui, sans-serif" font-size="13" fill="#334155">
    <rect x="100" y="290" width="16" height="16" rx="4" fill="#059669"/>
    <text x="124" y="303">Reakcja na incydenty produkcyjne</text>

    <rect x="100" y="322" width="16" height="16" rx="4" fill="#10b981"/>
    <text x="124" y="335">Onboarding nowych programistów</text>

    <rect x="480" y="290" width="16" height="16" rx="4" fill="#4f46e5"/>
    <text x="504" y="303">Czas na architekturę i decyzje produktowe</text>

    <rect x="480" y="322" width="16" height="16" rx="4" fill="#6366f1"/>
    <text x="504" y="335">Szybsze pisanie kodu</text>

    <rect x="480" y="354" width="16" height="16" rx="4" fill="#a5b4fc"/>
    <text x="504" y="367">Mniej regresji produkcyjnych</text>
  </g>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Największy udział w postrzeganej wartości rzadko pochodzi z samej szybkości pisania kodu</text>
</svg>
