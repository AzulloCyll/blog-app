<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">App Router — Struktura katalogów Next.js</text>

  <!-- App root folder -->
  <rect x="50" y="70" width="200" height="390" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="50" y="70" width="200" height="40" rx="12" fill="#f1f5f9"/>
  <rect x="50" y="98" width="200" height="12" fill="#f1f5f9"/>
  <text x="150" y="95" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#475569">📁 app/</text>

  <!-- Folder items -->
  <text x="75" y="134" font-family="monospace" font-size="12" fill="#64748b">📄 layout.tsx</text>
  <text x="75" y="158" font-family="monospace" font-size="12" fill="#64748b">📄 page.tsx</text>
  <text x="75" y="182" font-family="monospace" font-size="12" fill="#64748b">📄 loading.tsx</text>
  <text x="75" y="206" font-family="monospace" font-size="12" fill="#64748b">📄 error.tsx</text>
  <rect x="65" y="216" width="170" height="1" fill="#e2e8f0"/>
  <text x="75" y="238" font-family="monospace" font-size="12" fill="#6366f1">📁 posts/</text>
  <text x="95" y="260" font-family="monospace" font-size="12" fill="#64748b">📄 page.tsx</text>
  <text x="95" y="282" font-family="monospace" font-size="12" fill="#6366f1">  📁 [id]/</text>
  <text x="115" y="304" font-family="monospace" font-size="12" fill="#64748b">📄 page.tsx</text>
  <rect x="65" y="314" width="170" height="1" fill="#e2e8f0"/>
  <text x="75" y="336" font-family="monospace" font-size="12" fill="#6366f1">📁 api/</text>
  <text x="95" y="358" font-family="monospace" font-size="12" fill="#64748b">📁 posts/</text>
  <text x="115" y="380" font-family="monospace" font-size="12" fill="#64748b">📄 route.ts</text>
  <rect x="65" y="390" width="170" height="1" fill="#e2e8f0"/>
  <text x="75" y="410" font-family="monospace" font-size="12" fill="#64748b">📄 globals.css</text>
  <text x="75" y="432" font-family="monospace" font-size="12" fill="#64748b">📄 favicon.ico</text>

  <!-- Arrow -->
  <line x1="262" y1="250" x2="310" y2="250" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="310,245 320,250 310,255" fill="#94a3b8"/>

  <!-- Server Components box -->
  <rect x="330" y="100" width="240" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="330" y="100" width="240" height="40" rx="12" fill="url(#serverGrad)"/>
  <rect x="330" y="128" width="240" height="12" fill="url(#serverGrad)"/>
  <text x="450" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Server Components</text>
  <text x="350" y="160" font-family="system-ui, sans-serif" font-size="12" fill="#374151">✓ Domyślne w App Router</text>
  <text x="350" y="180" font-family="system-ui, sans-serif" font-size="12" fill="#374151">✓ Dostęp do bazy danych</text>
  <text x="350" y="200" font-family="system-ui, sans-serif" font-size="12" fill="#374151">✓ Mniejszy bundle JS</text>
  <text x="350" y="220" font-family="system-ui, sans-serif" font-size="12" fill="#374151">✓ Szybszy czas ładowania</text>

  <!-- Client Components box -->
  <rect x="330" y="270" width="240" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="330" y="270" width="240" height="40" rx="12" fill="url(#clientGrad)"/>
  <rect x="330" y="298" width="240" height="12" fill="url(#clientGrad)"/>
  <text x="450" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Client Components</text>
  <text x="350" y="330" font-family="system-ui, sans-serif" font-size="12" fill="#374151">'use client' dyrektywa</text>
  <text x="350" y="350" font-family="system-ui, sans-serif" font-size="12" fill="#374151">✓ useState / useEffect</text>
  <text x="350" y="370" font-family="system-ui, sans-serif" font-size="12" fill="#374151">✓ Event handlers</text>
  <text x="350" y="390" font-family="system-ui, sans-serif" font-size="12" fill="#374151">✓ Interaktywność UI</text>

  <!-- Arrow -->
  <line x1="582" y1="250" x2="630" y2="250" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="630,245 640,250 630,255" fill="#94a3b8"/>

  <!-- Result / Browser box -->
  <rect x="650" y="80" width="210" height="340" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="650" y="80" width="210" height="32" rx="12" fill="#1e293b"/>
  <rect x="650" y="100" width="210" height="12" fill="#1e293b"/>
  <circle cx="672" cy="96" r="5" fill="#ff5f57"/>
  <circle cx="688" cy="96" r="5" fill="#febc2e"/>
  <circle cx="704" cy="96" r="5" fill="#28c840"/>
  <text x="755" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280">localhost:3000</text>

  <!-- Browser content mock -->
  <rect x="662" y="124" width="186" height="24" rx="4" fill="#6366f1"/>
  <text x="755" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white">Mój Blog</text>

  <rect x="662" y="158" width="186" height="10" rx="3" fill="#e2e8f0"/>
  <rect x="662" y="174" width="140" height="10" rx="3" fill="#e2e8f0"/>
  <rect x="662" y="190" width="186" height="10" rx="3" fill="#e2e8f0"/>
  <rect x="662" y="206" width="100" height="10" rx="3" fill="#e2e8f0"/>

  <rect x="662" y="228" width="90" height="52" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="760" y="228" width="88" height="52" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="662" y="290" width="90" height="52" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="760" y="290" width="88" height="52" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="662" y="356" width="186" height="10" rx="3" fill="#e2e8f0"/>
  <rect x="662" y="372" width="120" height="10" rx="3" fill="#e2e8f0"/>
  <rect x="662" y="388" width="186" height="10" rx="3" fill="#e2e8f0"/>

  <!-- Label -->
  <text x="755" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Gotowa aplikacja</text>

  <!-- Bottom label -->
  <text x="450" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Next.js 14 App Router — od struktury katalogów do gotowej strony</text>
</svg>
