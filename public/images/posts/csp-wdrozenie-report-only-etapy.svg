<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0000001a"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Etapowe wdrożenie CSP</text>

  <rect x="90" y="180" width="300" height="120" rx="14" fill="url(#c1)" filter="url(#shadow)"/>
  <text x="240" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Report-Only</text>
  <text x="240" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.9">zbiera raporty,</text>
  <text x="240" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.9">nic nie blokuje</text>

  <rect x="510" y="180" width="300" height="120" rx="14" fill="url(#c2)" filter="url(#shadow)"/>
  <text x="660" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Enforce</text>
  <text x="660" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.9">po poprawieniu false</text>
  <text x="660" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.9">positives — blokuje</text>

  <line x1="390" y1="240" x2="505" y2="240" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Kilka dni w trybie Report-Only pozwala złapać zapomniane domeny przed włączeniem blokady</text>
</svg>
