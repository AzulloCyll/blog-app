<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Rozszerzenia, które zwracają się najszybciej</text>

  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <rect x="90" y="120" width="220" height="260" rx="16" fill="url(#c1)" filter="url(#shadow)"/>
    <text x="200" y="165" font-size="14" font-weight="700" fill="white">ESLint + Prettier</text>
    <text x="200" y="220" font-size="11" fill="white" opacity="0.9">Formatowanie</text>
    <text x="200" y="238" font-size="11" fill="white" opacity="0.9">przy zapisie</text>
    <text x="200" y="290" font-size="10" fill="white" opacity="0.8">eliminuje komentarze</text>
    <text x="200" y="306" font-size="10" fill="white" opacity="0.8">o stylu w review</text>

    <rect x="340" y="120" width="220" height="260" rx="16" fill="url(#c2)" filter="url(#shadow)"/>
    <text x="450" y="165" font-size="14" font-weight="700" fill="white">GitLens</text>
    <text x="450" y="220" font-size="11" fill="white" opacity="0.9">Kontekst historyczny</text>
    <text x="450" y="238" font-size="11" fill="white" opacity="0.9">w edytorze</text>
    <text x="450" y="290" font-size="10" fill="white" opacity="0.8">kto i kiedy zmienił</text>
    <text x="450" y="306" font-size="10" fill="white" opacity="0.8">daną linię, bez terminala</text>

    <rect x="590" y="120" width="220" height="260" rx="16" fill="url(#c3)" filter="url(#shadow)"/>
    <text x="700" y="165" font-size="14" font-weight="700" fill="white">Error Lens</text>
    <text x="700" y="220" font-size="11" fill="white" opacity="0.9">Błędy przy linii</text>
    <text x="700" y="238" font-size="11" fill="white" opacity="0.9">kodu</text>
    <text x="700" y="290" font-size="10" fill="white" opacity="0.8">krótsza pętla między</text>
    <text x="700" y="306" font-size="10" fill="white" opacity="0.8">błędem a jego zauważeniem</text>
  </g>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Każde eliminuje inną kategorię ręcznej, powtarzalnej pracy</text>
</svg>
