<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ok" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Nonce odróżnia legalny skrypt od wstrzykniętego</text>

  <rect x="90" y="110" width="330" height="260" rx="16" fill="url(#ok)" filter="url(#shadow)"/>
  <g font-family="monospace" font-size="11" fill="white" text-anchor="middle">
    <text x="255" y="160" font-weight="700" font-size="13">&lt;script nonce="xyz123"&gt;</text>
    <text x="255" y="185">// legalny kod aplikacji</text>
    <text x="255" y="210">&lt;/script&gt;</text>
  </g>
  <text x="255" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="white">✓ wykonany</text>

  <rect x="480" y="110" width="330" height="260" rx="16" fill="url(#bad)" filter="url(#shadow)"/>
  <g font-family="monospace" font-size="11" fill="white" text-anchor="middle">
    <text x="645" y="160" font-weight="700" font-size="13">&lt;script&gt;</text>
    <text x="645" y="185">// wstrzyknięty przez XSS</text>
    <text x="645" y="210">&lt;/script&gt;</text>
  </g>
  <text x="645" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="white">✗ zablokowany</text>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Atakujący nie zna nonce'a wygenerowanego dla tego konkretnego żądania</text>
</svg>
