<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Jeden ruch, pięć edycji naraz</text>

  <rect x="150" y="100" width="600" height="300" rx="14" fill="#1e293b" filter="url(#shadow)"/>
  <g font-family="monospace" font-size="15" fill="#94a3b8">
    <text x="180" y="150">const <tspan fill="#fca5a5">userName</tspan> = props.name;</text>
    <text x="180" y="190">console.log(<tspan fill="#fca5a5">userName</tspan>);</text>
    <text x="180" y="230">return &lt;span&gt;{<tspan fill="#fca5a5">userName</tspan>}&lt;/span&gt;;</text>
    <text x="180" y="270">export default <tspan fill="#fca5a5">userName</tspan>;</text>
  </g>
  <rect x="330" y="130" width="98" height="20" fill="#f87171" opacity="0.3" rx="3"/>
  <rect x="330" y="170" width="98" height="20" fill="#f87171" opacity="0.3" rx="3"/>
  <rect x="330" y="210" width="98" height="20" fill="#f87171" opacity="0.3" rx="3"/>
  <rect x="330" y="250" width="98" height="20" fill="#f87171" opacity="0.3" rx="3"/>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">⌘D zaznacza kolejne wystąpienia — zmiana nazwy zajmuje sekundy, nie minuty</text>
</svg>
