<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <text x="450" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Droga z mid na senior developera</text>

  <!-- Staircase -->
  <rect x="100" y="330" width="200" height="70" fill="url(#step1)" filter="url(#shadow)"/>
  <rect x="340" y="250" width="200" height="150" fill="url(#step2)" filter="url(#shadow)"/>
  <rect x="580" y="150" width="200" height="250" fill="url(#step3)" filter="url(#shadow)"/>

  <g font-family="system-ui, sans-serif" text-anchor="middle" fill="white" font-weight="700">
    <text x="200" y="370" font-size="15">Junior</text>
    <text x="440" y="330" font-size="15">Mid</text>
    <text x="680" y="190" font-size="15">Senior</text>
  </g>

  <g font-family="system-ui, sans-serif" text-anchor="middle" fill="white" font-size="11" opacity="0.9">
    <text x="440" y="360">Wykonuje zlecone</text>
    <text x="440" y="378">zadania samodzielnie</text>

    <text x="680" y="225">Wpływa na architekturę,</text>
    <text x="680" y="243">mentoruje, działa</text>
    <text x="680" y="261">w niejednoznaczności</text>
  </g>

  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Awans rzadko przychodzi automatycznie z latami stażu — wymaga zmiany sposobu myślenia</text>
</svg>
